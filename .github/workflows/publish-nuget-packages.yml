name: Publish NuGet packages
on:
  push:
    branches:
    - master
jobs:
  PublishNugetPackages:
    runs-on: ubuntu-latest
    permissions:
      contents: read       # actions/checkout
      packages: write      # push to GitHub Packages via GITHUB_TOKEN
      id-token: write       # request the OIDC token for NuGet.org Trusted Publishing
    steps:
    - uses: actions/setup-dotnet@v1
      with:
        dotnet-version: | 
          10.0.x
          8.0.x
    - name: Checkout repository
      uses: actions/checkout@v2
    - name: Create packages
      run: dotnet pack code/Packages.slnx -o Packages -c Release --version-suffix ${{ github.run_number }}
    - name: Publish packages to GitHub Packages
      run: dotnet nuget push Packages/*.nupkg --source https://nuget.pkg.github.com/Staticsoft/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
    - name: NuGet.org login (OIDC -> short-lived API key)
      uses: NuGet/login@v1
      id: nuget-login
      with:
        user: ${{ secrets.NUGET_USER }}   # nuget.org username of the Trusted Publishing policy CREATOR (not the org owner)
    - name: Publish packages to NuGet.org
      run: dotnet nuget push Packages/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --skip-duplicate